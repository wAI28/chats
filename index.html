<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Anom Chat</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    position:fixed;
    background:#000;
    font-family:-apple-system,sans-serif;
    touch-action:none;
}

body{
    inset:0;
}

#chat-container{
    width:100vw;
    height:100dvh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

#chat-window{
    flex:1;
    min-height:0;
    padding:20px;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    gap:12px;
    overflow-y:auto;
    overflow-x:hidden;
}

.message{
    padding:12px 16px;
    border-radius:20px;
    align-self:flex-start;
    max-width:75%;
    font-size:15px;
    color:white;
    background:linear-gradient(135deg,#444,#222);
    word-break:break-word;
}

.message a{
    color:#4da3ff;
    text-decoration:none;
    word-break:break-all;
}

.message a:hover{
    text-decoration:underline;
}

.chat-image{
    display:block;
    max-width:250px;
    max-height:300px;
    border-radius:12px;
    object-fit:contain;
}

#input-area{
    width:100%;
    padding:10px 15px calc(10px + env(safe-area-inset-bottom));
    display:flex;
    align-items:center;
    background:#000;
    border-top:1px solid #222;
    flex-shrink:0;
}

#message-input{
    flex:1;
    min-width:0;
    padding:12px 15px;
    background:#1a1a1a;
    border:1px solid #333;
    border-radius:25px;
    outline:none;
    color:white;
    font-size:15px;
}

#send-btn{
    margin-left:10px;
    background:none;
    border:none;
    cursor:pointer;
    padding:5px;
    flex-shrink:0;
}

#send-btn svg{
    fill:#0095f6;
    width:24px;
    height:24px;
    transition:0.2s;
}

#send-btn:disabled svg{
    fill:#444;
}
</style>
</head>
<body>

<div id="chat-container">

    <div id="chat-window"></div>

    <div id="input-area">
        <input
            type="text"
            id="message-input"
            placeholder="Type a message..."
            autocomplete="off"
        >

        <button id="send-btn" disabled>
            <svg viewBox="0 0 24 24">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    query,
    orderBy,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBr6fn0z5WiCb8r0ho9dRM_rcJFncEZfdg",
    authDomain: "click-396e8.firebaseapp.com",
    projectId: "click-396e8",
    storageBucket: "click-396e8.firebasestorage.app",
    messagingSenderId: "985576350437",
    appId: "1:985576350437:web:ed65dbfff76cbdf5c2ea0c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const chatWindow = document.getElementById('chat-window');
const messageInput = document.getElementById('message-input');
const sendBtn = document.getElementById('send-btn');

let lastSendTime = 0;
const SEND_COOLDOWN = 3000;

function escapeHtml(text){
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function linkify(text){

    text = escapeHtml(text);

    const urlRegex = /((https?:\/\/)?(www\.)?[a-zA-Z0-9-]+\.[a-zA-Z]{2,}(\/[^\s<]*)?)/gi;

    return text.replace(urlRegex, (url) => {

        let href = url;

        if(
            !href.startsWith('http://') &&
            !href.startsWith('https://')
        ){
            href = 'https://' + href;
        }

        return `<a href="${href}" target="_blank" rel="noopener noreferrer">${url}</a>`;
    });
}

messageInput.addEventListener('input', () => {

    const cooldownActive =
        Date.now() - lastSendTime < SEND_COOLDOWN;

    sendBtn.disabled =
        messageInput.value.trim() === "" || cooldownActive;
});

sendBtn.addEventListener('click', async () => {

    const now = Date.now();

    if(now - lastSendTime < SEND_COOLDOWN){
        return;
    }

    const text = messageInput.value.trim();

    if(text !== ""){

        lastSendTime = now;
        sendBtn.disabled = true;

        await addDoc(collection(db, "chat"), {
            text: text,
            createdAt: serverTimestamp()
        });

        messageInput.value = "";

        setTimeout(() => {

            if(messageInput.value.trim() !== ""){
                sendBtn.disabled = false;
            }

        }, SEND_COOLDOWN);
    }
});

const q = query(
    collection(db, "chat"),
    orderBy("createdAt", "asc")
);

onSnapshot(q, (snapshot) => {

    chatWindow.innerHTML = "";

    snapshot.forEach((doc) => {

        const data = doc.data();
        const text = data.text || "";

        const msgDiv = document.createElement('div');
        msgDiv.className = "message";

        if(text.startsWith("!image:")){

            const imageUrl = text.substring(7).trim();

            msgDiv.innerHTML = `
                <img
                    class="chat-image"
                    src="${imageUrl}"
                    loading="lazy"
                    alt="image"
                >
            `;

        }else{

            msgDiv.innerHTML = linkify(text);

        }

        chatWindow.appendChild(msgDiv);
    });

    chatWindow.scrollTop = chatWindow.scrollHeight;
});

messageInput.addEventListener('keydown', (e) => {

    if(e.key === 'Enter' && !sendBtn.disabled){
        sendBtn.click();
    }

});

document.addEventListener('touchmove', e => {
    e.preventDefault();
}, { passive:false });

document.addEventListener('gesturestart', e => {
    e.preventDefault();
});
</script>

</body>
</html>
