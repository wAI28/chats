<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Live Chat</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, sans-serif; background-color: #000; }
        #chat-container { height: 100vh; display: flex; flex-direction: column; }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .message { 
            padding: 12px 16px; border-radius: 20px; align-self: flex-start; 
            max-width: 75%; font-size: 15px; color: white;
            background: linear-gradient(135deg, #444, #222);
            word-break: break-all;
        }
        
        #input-area { padding: 10px 15px; display: flex; align-items: center; background: #000; border-top: 1px solid #222; }
        #message-input { 
            flex: 1; padding: 12px 15px; background: #1a1a1a; border: 1px solid #333; 
            border-radius: 25px; outline: none; color: white; font-size: 15px; 
        }
        
        #send-btn { margin-left: 10px; background: none; border: none; cursor: pointer; padding: 5px; }
        #send-btn svg { fill: #0095f6; width: 24px; height: 24px; transition: 0.2s; }
        #send-btn:disabled svg { fill: #444; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="chat-window"></div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="메시지 보내기..." autocomplete="off">
            <button id="send-btn" disabled>
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        // Firebase 설정 (본인의 키로 유지하세요)
        const firebaseConfig = {
            apiKey: "AIzaSyBr6fn0z5WiCb8r0ho9dRM_rcJFncEZfdg",
            authDomain: "click-396e8.firebaseapp.com",
            projectId: "click-396e8",
            storageBucket: "click-396e8.firebasestorage.app",
            messagingSenderId: "985576350437",
            appId: "1:985576350437:web:ed65dbfff76cbdf5c2ea0c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const chatWindow = document.getElementById('chat-window');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        // 입력 버튼 활성화 제어
        messageInput.addEventListener('input', () => {
            sendBtn.disabled = messageInput.value.trim() === "";
        });

        // Firebase에 메시지 저장
        sendBtn.addEventListener('click', async () => {
            const text = messageInput.value.trim();
            if (text !== "") {
                await addDoc(collection(db, "chat"), {
                    text: text,
                    createdAt: serverTimestamp()
                });
                messageInput.value = "";
                sendBtn.disabled = true;
            }
        });

        // 실시간 채팅 로드
        const q = query(collection(db, "chat"), orderBy("createdAt", "asc"));
        onSnapshot(q, (snapshot) => {
            snapshot.docChanges().forEach((change) => {
                if (change.type === "added") {
                    const data = change.doc.data();
                    const msgDiv = document.createElement('div');
                    msgDiv.classList.add('message');
                    msgDiv.textContent = data.text;
                    chatWindow.appendChild(msgDiv);
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                }
            });
        });

        // 엔터키 전송
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) sendBtn.click();
        });
    </script>
</body>
</html>
